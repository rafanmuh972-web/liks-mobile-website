    .product-card .price { font-weight: bold; margin-bottom: .8rem; font-size: 1.1rem; }
    .product-card a { display: inline-block; padding: .55rem 1rem; background: #fff; color: #0A2647; border-radius: 5px; text-decoration: none; font-weight: bold; }
    .product-card a:hover { background: #e2e8f0; }

function imgFor(model){
